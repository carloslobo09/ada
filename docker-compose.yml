services:
  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: ada-back
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      EXTRACTOR_MODE: ${EXTRACTOR_MODE:-mock}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      DB_URL: sqlite:////data/ada.db
      UPLOAD_DIR: /data/uploads
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ada-data:/data

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: ada-front
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - back

volumes:
  ada-data:

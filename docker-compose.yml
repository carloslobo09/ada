services:
  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: ada-back
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./back/.env
    environment:
      # Sobreescriben los paths definidos en back/.env: dentro del container apuntan al volumen.
      DB_URL: sqlite:////data/ada.db
      UPLOAD_DIR: /data/uploads
    volumes:
      - ada-data:/data

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: ada-front
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - back

volumes:
  ada-data:
